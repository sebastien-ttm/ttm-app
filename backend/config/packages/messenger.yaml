framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    table_name: messenger_messages
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\SendPushNotificationsMessage: async
            App\Message\SendMagicLinkEmailMessage: async
            App\Message\SendTrainingPlanEmailsMessage: async
            App\Message\NotifyNewUserMessageMessage: async
            App\Message\NotifyUserMessageReplyMessage: async
