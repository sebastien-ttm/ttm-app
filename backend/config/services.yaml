parameters:
    app.public_url: '%env(APP_PUBLIC_URL)%'
    app.mobile_scheme: '%env(APP_MOBILE_SCHEME)%'
    app.magic_link_ttl: '%env(int:MAGIC_LINK_TTL)%'
    app.mailer_from: '%env(MAILER_FROM)%'
    app.mailer_from_name: '%env(MAILER_FROM_NAME)%'
    app.expo_access_token: '%env(EXPO_ACCESS_TOKEN)%'
    app.uploads.articles_dir: '%kernel.project_dir%/public/uploads/articles'
    app.uploads.banners_dir: '%kernel.project_dir%/public/uploads/banners'
    app.uploads.training_dir: '%kernel.project_dir%/var/uploads/training'
    app.uploads.training_slots_dir: '%kernel.project_dir%/var/uploads/training-slots'
    app.uploads.inline_dir: '%kernel.project_dir%/public/uploads/inline'
    app.uploads.avatars_dir: '%kernel.project_dir%/public/uploads/avatars'
    app.uploads.pool_badges_dir: '%kernel.project_dir%/public/uploads/pool-badges'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $publicUrl: '%app.public_url%'
            $mobileScheme: '%app.mobile_scheme%'
            $ttl: '%app.magic_link_ttl%'
            $expoAccessToken: '%app.expo_access_token%'
            $csvImportLogger: '@monolog.logger.csv_import'
            $pushLogger: '@monolog.logger.push'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            # DataFixtures dépendent de doctrine/doctrine-fixtures-bundle qui
            # est en require-dev ; on les exclut de la compilation par défaut
            # et on les réactive uniquement en dev/test (voir blocs when@*).
            - '../src/DataFixtures/'

    App\EventListener\AuthSuccessListener:
        arguments:
            $refreshTtl: 2592000

    App\Service\Serializer\ApiSerializer:
        arguments:
            $publicUrl: '%app.public_url%'

    App\Controller\Api\TrainingPlanController:
        arguments:
            $trainingDir: '%app.uploads.training_dir%'

    App\Service\Training\AttachmentService:
        arguments:
            $trainingSlotsDir: '%app.uploads.training_slots_dir%'

    App\Service\AvatarService:
        arguments:
            $avatarsDir: '%app.uploads.avatars_dir%'
            $publicUrl: '%app.public_url%'

    App\Controller\Admin\InlineUploadController:
        arguments:
            $uploadDir: '%app.uploads.inline_dir%'

    # HTMLPurifier for sanitizing article HTML
    HTMLPurifier:
        class: HTMLPurifier
        factory: ['App\Service\HtmlPurifierFactory', 'create']

when@dev:
    services:
        App\DataFixtures\:
            resource: '../src/DataFixtures/'

        App\DataFixtures\AppFixtures:
            arguments:
                $projectDir: '%kernel.project_dir%'

when@test:
    services:
        App\DataFixtures\:
            resource: '../src/DataFixtures/'

        App\DataFixtures\AppFixtures:
            arguments:
                $projectDir: '%kernel.project_dir%'
