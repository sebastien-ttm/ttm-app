<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo TTM carré (source officielle) — fond rouge club + monogramme blanc
  + bandeau bleu inférieur. Identique au logo affiché sur la page de login
  de l'app mobile. Utilisé comme source pour générer toutes les icônes
  PWA (favicon, apple-touch-icon, manifest icons).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond rouge club -->
  <rect width="512" height="512" fill="#D32F2F"/>

  <!-- Monogramme TTM, blanc, gras, légèrement remonté pour laisser place au bandeau -->
  <text
    x="256"
    y="280"
    fill="#FFFFFF"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="180"
    letter-spacing="6"
    text-anchor="middle"
    dominant-baseline="middle">TTM</text>

  <!-- Bandeau bleu en bas (clin d'œil natation / triathlon) -->
  <rect x="0" y="470" width="512" height="42" fill="#1d4ed8"/>
</svg>
